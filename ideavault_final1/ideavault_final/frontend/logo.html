<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>IdeaVault</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@400;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; }
    body {
      margin: 0; min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Outfit', system-ui, sans-serif; background: #F8FAFC; color: #0F172A;
    }
    .wrap { text-align: center; padding: 24px; }
    h1 {
      font-size: clamp(2rem, 5vw, 2.75rem); font-weight: 700; margin: 0 0 8px;
      background: linear-gradient(90deg, #6366F1, #3B82F6); -webkit-background-clip: text;
      -webkit-text-fill-color: transparent; background-clip: text;
    }
    p { color: #64748B; margin: 0 0 24px; }
    .ring {
      width: 48px; height: 48px; border: 3px solid #E2E8F0; border-top-color: #6366F1;
      border-radius: 50%; margin: 0 auto; animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    .logo {
      width: 140px; height: 140px; margin: 0 auto 24px; border-radius: 50%;
      background: radial-gradient(circle at 30% 30%, #EEF2FF, #C7D2FE);
      box-shadow: 0 0 56px rgba(99, 102, 241, 0.4); display: flex; align-items: center; justify-content: center;
      animation: pulse 2.4s ease-in-out infinite;
    }
    .logo img { width: 80%; height: 80%; object-fit: contain; border-radius: 0; }
    @keyframes pulse { 0%,100%{box-shadow:0 0 40px rgba(99,102,241,0.35)} 50%{box-shadow:0 0 72px rgba(99,102,241,0.6)} }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="logo" aria-hidden="true">
      <img src="/assets/logo.png" alt="IdeaVault" width="112" height="112" />
    </div>
    <h1>IdeaVault</h1>
    <p>Where Ideas Take Shape</p>
    <div class="ring" role="status" aria-label="Loading"></div>
  </div>
  <script>
    setTimeout(function () {
      var id = localStorage.getItem('ideavault_userId');
      window.location.href = id ? '/dashboard.html' : '/login.html';
    }, 3500);
  </script>
</body>
</html>
